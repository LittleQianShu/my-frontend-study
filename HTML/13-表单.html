<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <form action="">
    <ul>
      <li>
        <label>
          账号：
          <input type="text" placeholder="请输入账号" name="username" maxlength="15" accesskey="s" autocomplete="off">
        </label>
      </li>
      <li>
        <label>
          密码：
          <input type="password" placeholder="请输入密码" name="pwd" maxlength="15">
        </label>
      </li>
      <li>
        <label>
          性别：
          <input type="radio" name="gender" value="女" checked id="nv">
          <label for="nv">女</label>
          <input type="radio" name="gender" value="男" checked id="nan">
          <label for="nan">男</label>
        </label>
      </li>
      <li>
        <label>
          爱好：
          <input type="checkbox" name="hobby" value="篮球">篮球
        </label>
        <label>
          <input type="checkbox" name="hobby" value="足球" checked>足球
        </label>
        <label>
          <input type="checkbox" name="hobby" value="跑步" checked>跑步
        </label>
      </li>
      <li>
        <label>
          头像：
          <input type="file" name="file" multiple accept=".exe,.jpg,.mp4">
        </label>
      </li>
      <li>
        <label>
          留言：
          <textarea name="message" cols="30" rows="10" placeholder="请输入留言"></textarea>
        </label>
      </li>
      <li>
          城市：
          <select name="city" id="">
            <option value="北京">北京</option>
            <option value="上海">上海</option>
            <option value="广州">广州</option>
            <option value="深圳">深圳</option>
            <option value="成都">成都</option>
            <option value="西安">西安</option>
            <option value="重庆">重庆</option>
            <option value="淮安">淮安</option>
      </li>
      <li>
        <button>登录</button>
      </li>
    </ul>
  </form>
</body>
</html>
