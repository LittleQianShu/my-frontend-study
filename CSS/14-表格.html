<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .data {
      border-collapse: collapse;
      border: 1px solid #f1f1f1;
      width: 800px;
      margin: 0 auto;
      text-align: center;
      font-size: 20px;
    }

    .data tr {
      height: 52px;
    }

    .data tr:first-child {
      background-color: #8fbcf1 !important;
      color: #fff;
    }

    .data tr:nth-child(odd) {
      background-color: #f1f1f1;
    }

    .data tr:hover {
      background-color: #179dd759;
    }

    table,
    th,
    td {
      border: 1px solid #0b0000;
    }
  </style>
</head>

<body>
  <table class="data">
    <tr>
      <th>姓名</th>
      <th>数据</th>
      <th>日期</th>
    </tr>
    <tr>

    </tr>
    <tr>

      <td>9分</td>
      <td>2001年10月31日</td>
    </tr>
    <tr>
      <td>王治郅</td>
      <td>6分</td>
      <td>2023年4月6日</td>
    </tr>
    <tr>
      <td>孙锐</td>
      <td>4分</td>
      <td>2008年12月8日</td>
    </tr>
    <tr>
      <td>周琦</td>
      <td>2分</td>
      <td>2018年10月31日</td>
    </tr>
    <tr>
      <td>姚明</td>
      <td>0分</td>
      <td>2002年10月31日</td>
    </tr>
    <tr>
      <td>崔永熙</td>
      <td>1分</td>
      <td>2024年10月28日</td>
    </tr>
  </table>
</body>

</html>
