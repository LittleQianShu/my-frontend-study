<!DOCTYPE html> <!-- 声明文档类型为HTML5 -->
<html lang="en"> <!-- HTML根元素，语言设置为英文 -->
<head> <!-- 头部区域，包含元数据 -->
  <meta charset="UTF-8"> <!-- 设置字符编码为UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 设置视口，确保页面在移动设备上正确显示 -->
  <title>Document</title> <!-- 网页标题 -->
  <!-- 内部样式表 -->
  <style>
    /* <!-- 内部样式表开始 */
    /*div元素选择器样式1*/
    div {
      /*选择所有div元素*/
    color:pink;
    /*设置文字颜色为粉色*/
    font-size: 20px;
    /*设置字体大小为20像素*/
    }
    /*li元素选择器样式*/
    .li {
      /*选择所有li元素*/
      color: blue;
      font-size:20px;
    /*设置所有列表项为蓝色、字体20px*/
    /*设置文字颜色为蓝色*/
    /*设置字体大小为20像素*/
    }
    /*div元素选择器样式2*/
    .id {
      /*选择所有div元素*/
    color: red;
    font-size:20px; 
    /*设置字体大小为20像素*/
    }
  </style> <!-- 内部样式表结束 -->
</head> <!-- 头部区域结束 -->

<body> <!-- 主体区域，包含可见内容 -->
  <!-- 第一个无序列表 -->
  <ul> <!-- 无序列表开始 -->
    <!-- 使用内联样式覆盖内部样式表的样式 -->
    <li class="id">大春</li> <!-- 列表项 -->
    <li class="id">夏洛</li> <!-- 列表项 -->
    <li class="id">秋雅</li> <!-- 列表项 -->
    <li class="id">冬梅</li> <!-- 列表项 -->
  </ul> <!-- 无序列表结束 -->
  <!-- 第二个无序列表 - 使用内部样式表的默认样式 -->
  <ul> <!-- 无序列表开始 -->
    <li class="li">猪爸爸</li> <!-- 列表项，使用内部样式表的蓝色 -->
    <li class="li">猪妈妈</li> <!-- 列表项，使用内部样式表的蓝色 -->
    <li class="li">佩奇</li> <!-- 列表项，使用内部样式表的蓝色 -->
    <li class="li">乔治</li> <!-- 列表项，使用内部样式表的蓝色 -->
  </ul> <!-- 无序列表结束 -->
</body> <!-- 主体区域结束 -->

</html> <!-- HTML文档结束 -->
