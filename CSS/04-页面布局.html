<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- 头部样式 -->
  <style>
    * {
      margin: 0;
      /* 取消默认的内边距 */
      padding: 0;
      /* 取消默认的边框 */
    }
    .header {
      height: 80px;
      background-color: black;
    }
    .nav {
      width: 800px;
      height: 30px;
      background-color: skyblue;
    }
    .main {
      width: 800px;
      height: 1000px;
      background-color: #0a7906;
    }
    .footer {
      width: 1029px;
      height: 160px;
      background-color: #710364;
    }
    /* 居中对齐 */
    .center {
      margin: 0 auto;
    }
  </style>
  </head>
<body>
  <!-- 头部 -->
  <div class="header"></div>
  <!-- 导航栏 -->
  <div class="nav center"></div>
  <!-- 主体 -->
  <div class="main center"></div>
  <!-- 页脚 -->
  <div class="footer"></div>
</body>
</html>
