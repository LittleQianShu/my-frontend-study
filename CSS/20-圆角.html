<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .radius1 {
      width: 200px;
      height: 200px;
      background-color: pink;
      border-radius: 50%;
    }

    .radius2 {
      width: 200px;
      height: 200px;
      background-color: pink;
      border-radius: 10px;
    }

    .radius3 {
      width: 200px;
      height: 40px;
      background-color: skyblue;
      border-radius: 20px;
    }

    .radius4 {
      width: 40px;
      height: 200px;
      background-color: skyblue;
      border-radius: 20px;
    }

    .radius5 {
      width: 200px;
      height: 200px;
      background-color: rgb(196, 255, 192);
      border-radius: 10px;
    }

    .radius6 {
      width: 200px;
      height: 200px;
      background-color: orange;
      border-radius: 10px 30px;
    }

    .radius7 {
      width: 200px;
      height: 200px;
      background-color: pink;
      border-radius: 10px 30px 50px;
    }

    .radius8 {
      width: 200px;
      height: 200px;
      background-color: rgb(197, 192, 255);
      border-radius: 10px 30px 50px 70px;
    }
  </style>
</head>

<body>
  <div class="radius1"></div>
  <div class="radius2"></div>
  <div class="radius3">胶囊按钮</div>
  <div class="radius4"></div>
  <div class="radius5">一个值</div>
  <div class="radius6">两个值</div>
  <div class="radius7">三个值</div>
  <div class="radius8">四个值</div>
</body>

</html>
