<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background-color: pink;
      text-align: center;
      line-height: 100px;
    }
    /* 伪类选择器 */
    .box:hover {
      background-color: red;
      color: #fff;
    }
    .search {
      width: 100px;
      height: 20px;
      /* transition: .5s; */
    }
    .search:focus {
      background-color: red;
      width: 200px;
    }
  </style>
</head>

<body>
  <div class="box">文字</div>

  <input type="text" class="search">
</body>

</html>
