<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .ul1 li:first-child {
      color: red;
    }
    .ul1 li:last-child {
      color: blue;
    }
    .ul1 li:nth-child(3) {
      color: green;
    }
    .ul1 li:nth-child(8) {
      color: purple;
    }
    .ul2 li:nth-child(odd) {
      color: red;
    }
    .ul2 li:nth-child(even) {
      color: blue;
    }
    .ul2 li:nth-child(5n) {
      color: green;
    }
    /* .ul2 li:nth-child(n+3) {
      color: red;
    } */
    .ul2 li:nth-child(-n+2 ) {
      color: rgb(230, 0, 255);
    }
  </style>
</head>
<body>
  <ul class="ul1">
    <li>第1个li</li>
    <li>第2个li</li>
    <li>第3个li</li>
    <li>第4个li</li>
    <li>第5个li</li>
    <li>第6个li</li>
    <li>第7个li</li>
    <li>第8个li</li>
    <li>第9个li</li>
    <li>第10个li</li>
  </ul>
  <ul class="ul2">
    <li>第1个li</li>
    <li>第2个li</li>
    <li>第3个li</li>
    <li>第4个li</li>
    <li>第5个li</li>
    <li>第6个li</li>
    <li>第7个li</li>
    <li>第8个li</li>
    <li>第9个li</li>
    <li>第10个li</li>
  </ul>
</body>
</html>
