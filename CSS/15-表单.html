<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
  button {
    width: 200px;
    height: 50px;
    background: #ff6900;
    border: none;
    color: #fff;
    font-size: 16px;
  }    
  button:disabled {
    /* background: #ccc; */
    opacity: 0.4;
  }
   input {
    background-color: #ff6900;
   }
   input:checked+label {
color: #ff6900;
   }
  </style>
</head>
<body>
  <button disabled>注册</button>
  <br>
  <input type="checkbox" id="agree">
  <label for="agree">同意注册协议</label>
</body>
</html>
